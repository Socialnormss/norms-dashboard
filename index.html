<!DOCTYPE html>
<html lang="th"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0D0D0D">
<link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Norms READ</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--bg:#0D0D0D;--card:#161616;--line:#2a2a2a;--orange:#f27e53;--txt:#ededed;--dim:#9a9a9a;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
     max-width:760px;margin:0 auto;padding:env(safe-area-inset-top) 0 40px;}
header{padding:18px 16px 12px;position:sticky;top:0;background:rgba(13,13,13,.93);
       backdrop-filter:blur(10px);z-index:10;border-bottom:1px solid var(--line);}
h1{font-size:18px;font-weight:700;}h1 .dot{color:var(--orange);}
.built{font-size:12px;color:var(--dim);margin-top:2px;}
#q{width:100%;margin-top:12px;padding:11px 14px;border-radius:12px;border:1px solid var(--line);
   background:var(--card);color:var(--txt);font-size:15px;}#q::placeholder{color:#666;}
main{padding:14px 14px 0;}
/* ATS strip */
.ats{display:flex;align-items:center;gap:10px;background:#1a1410;border:1px solid #3a2b20;
     border-radius:12px;padding:10px 14px;margin-bottom:18px;font-size:13px;}
.ats .pct{font-size:20px;font-weight:800;color:var(--orange);}
.ats .bar{flex:1;height:7px;background:#000;border-radius:5px;overflow:hidden;}
.ats .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),#ffb088);}
.ats .meta{color:var(--dim);white-space:nowrap;}
.ats .cur{font-size:11px;color:var(--dim);margin-top:3px;}
.sec-h{font-size:13px;font-weight:700;color:var(--dim);text-transform:uppercase;
       letter-spacing:1px;margin:22px 4px 10px;}
.card{display:flex;justify-content:space-between;align-items:center;gap:10px;
      background:var(--card);border:1px solid var(--line);border-radius:13px;
      padding:15px 16px;margin-bottom:9px;cursor:pointer;}
.card:active{border-color:var(--orange);}
.card .t{font-weight:600;font-size:15px;flex:1;}
.card .m{font-size:11px;color:var(--dim);white-space:nowrap;}
.card::after{content:"›";color:var(--orange);font-size:22px;}
.hide{display:none!important;}
footer{text-align:center;color:#555;font-size:11px;margin-top:30px;}
/* reader overlay */
#reader{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;flex-direction:column;
        max-width:760px;margin:0 auto;}
#reader.on{display:flex;}
.rbar{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);
      position:sticky;top:0;background:rgba(13,13,13,.96);backdrop-filter:blur(10px);}
.rbar .back{color:var(--orange);font-size:16px;font-weight:600;background:none;border:none;cursor:pointer;}
.rbar .rt{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rbody{overflow-y:auto;padding:18px 18px 80px;-webkit-overflow-scrolling:touch;}
.md{font-size:16px;line-height:1.75;color:#e6e6e6;overflow-wrap:anywhere;}
.md h1,.md h2,.md h3{color:var(--txt);margin:18px 0 8px;line-height:1.3;}
.md h1{font-size:22px;}.md h2{font-size:19px;}.md h3{font-size:16px;color:var(--orange);}
.md p{margin:10px 0;}.md ul,.md ol{margin:10px 0 10px 22px;}.md li{margin:4px 0;}
.md code{background:#000;padding:1px 6px;border-radius:5px;font-size:14px;color:#ffb088;}
.md pre{background:#000;padding:12px;border-radius:10px;overflow-x:auto;}.md pre code{padding:0;}
.md a{color:var(--orange);}.md blockquote{border-left:3px solid var(--orange);padding-left:12px;color:var(--dim);margin:10px 0;}
.md hr{border:none;border-top:1px solid var(--line);margin:18px 0;}
.md table{border-collapse:collapse;width:100%;margin:12px 0;font-size:14px;display:block;overflow-x:auto;}
.md th,.md td{border:1px solid var(--line);padding:7px 10px;}.md th{background:#000;color:var(--orange);}
.loading{color:var(--dim);padding:20px 0;}
</style></head><body>
<header>
  <h1>Norms <span class="dot">●</span> READ</h1>
  <div class="built" id="built"></div>
  <input id="q" type="search" placeholder="🔍 ค้นหาชื่อบท/ไฟล์…" autocomplete="off">
</header>
<main id="app"></main>
<footer id="foot"></footer>

<div id="reader">
  <div class="rbar"><button class="back" onclick="closeReader()">‹ กลับ</button><span class="rt" id="rt"></span></div>
  <div class="rbody"><div class="md" id="rbody"></div></div>
</div>

<script>
const D = {"built": "27 May 26 · 09:23", "ats": {"sources": [{"key": "npc_gen1", "label": "Gen1", "total": 168, "icon": "📘", "done": 168, "pct": 100}, {"key": "npc_gen2", "label": "Gen2", "total": 145, "icon": "📙", "done": 108, "pct": 74}, {"key": "nmspc", "label": "NMSPC", "total": 62, "icon": "📕", "done": 34, "pct": 55}, {"key": "fblive", "label": "FB Live", "total": 234, "icon": "📺", "done": 0, "pct": 0}], "done": 310, "target": 609, "remaining": 299, "pct": 51, "workers": 1, "days": 7, "eta": "2026-06-03", "current": "npc_gen2 / Plan 12.6.2025"}, "sections": [{"id": "01-current", "icon": "🔨", "label": "งานกำลังทำ — ติดตาม/ตรวจ", "files": [{"slug": "01-current--Norm-Book-Progress", "title": "🏁 Norms Book v1 Demo Overnight Assembly — COMPLETE", "lines": 80, "mtime_ago": "6d ago"}, {"slug": "01-current--PIPELINE-STATUS", "title": "Knowledge Pipeline — Master Status", "lines": 176, "mtime_ago": "3d ago"}, {"slug": "01-current--STATUS", "title": "Status — Max-Only Operating Model", "lines": 135, "mtime_ago": "3m ago"}]}, {"id": "02-unfinished", "icon": "⏳", "label": "งานค้าง — ยังไม่เสร็จ", "files": [{"slug": "02-unfinished--Compliance-Ch6-12-13-14", "title": "🔍 Norms Book v1 Demo · Compliance Report", "lines": 89, "mtime_ago": "5d ago"}, {"slug": "02-unfinished--PENDING", "title": "PENDING — สิ่งที่หลิวต้อง approve / decide / test", "lines": 80, "mtime_ago": "5m ago"}]}, {"id": "03-chapters", "icon": "📖", "label": "บทหนังสือ (จาก atoms) — อ่าน/แก้คำ", "files": [{"slug": "03-chapters--Chapter-01", "title": "บท 1 · บทที่ 1 — High-Low เริ่มต้น", "lines": 592, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-02", "title": "บท 2 · บทที่ 2 — Liquidity 3 ประเภท", "lines": 644, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-03", "title": "บท 3 · บทที่ 3 — Entry Mastery (8-Position + F1/F2)", "lines": 618, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-04", "title": "บท 4 · บทที่ 4 — MSE Mastery", "lines": 730, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-05", "title": "บท 5 · บทที่ 5 — NES = Wyckoff Subset", "lines": 633, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-06", "title": "บท 6 · บทที่ 6 — Volume Mastery", "lines": 754, "mtime_ago": "5d ago"}, {"slug": "03-chapters--Chapter-07", "title": "บท 7 · บทที่ 7 — Volume × Session Confluence", "lines": 648, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-08", "title": "บท 8 · บทที่ 8 — Wyckoff Phase A Mastery", "lines": 814, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-09", "title": "บท 9 · บทที่ 9 — Composite Operator (เสือ-กบ-ส้ม)", "lines": 555, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-10", "title": "บท 10 · บทที่ 10 — Wyckoff Phase B + Distribution Mirror", "lines": 722, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-11", "title": "บท 11 · บทที่ 11 — Paradox: ตลาดเอาคืน (Closing Synthesis)", "lines": 496, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-12", "title": "บท 12 · บทที่ 12 — Play ≠ Win (Manifesto)", "lines": 709, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-13", "title": "บท 13 · บทที่ 13 — Chart Tool Pedagogy", "lines": 600, "mtime_ago": "5d ago"}, {"slug": "03-chapters--Chapter-14", "title": "บท 14 · บทที่ 14 — Question Authority (Critical Thinking)", "lines": 513, "mtime_ago": "5d ago"}, {"slug": "03-chapters--Chapter-15", "title": "บท 15 · บทที่ 15 — Belief Engine (Psychology Foundation)", "lines": 640, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-16", "title": "บท 16 · บทที่ 16 — 4-Layer Subconscious Sabotage", "lines": 717, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-17", "title": "บท 17 · บทที่ 17 — Sandbox Reframe (Newbie Onboarding)", "lines": 572, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-18", "title": "บท 18 · บทที่ 18 — NPC Live Execution (Applied Closing)", "lines": 666, "mtime_ago": "6d ago"}, {"slug": "03-chapters--Chapter-19", "title": "บท 19 · บทที่ 19 — Wyckoff 5-Step Approach: ปูพื้นก่อนวางผัง", "lines": 226, "mtime_ago": "12h ago"}, {"slug": "03-chapters--Chapter-20", "title": "บท 20 · บทที่ 20 — EP9 ≡ Wyckoff · เฉลยความลับจักรวาล", "lines": 604, "mtime_ago": "43m ago"}]}], "archive": []};
const $ = (s,el=document)=>el.querySelector(s);
marked.setOptions({gfm:true,breaks:true});

function atsStrip(a){
  return `<div class="ats">
    <span class="pct">${a.pct}%</span>
    <div style="flex:1">
      <div class="bar"><i style="width:${a.pct}%"></i></div>
      ${a.current?`<div class="cur">▶️ ${a.current}</div>`:""}
    </div>
    <span class="meta">${a.done}/${a.target} EP<br>ETA ${a.eta}</span>
  </div>`;
}
function cardHTML(f){
  return `<div class="card" data-slug="${f.slug}" data-t="${f.title.toLowerCase()}" onclick="openReader('${f.slug}','${f.title.replace(/'/g,"\\'")}')">
    <span class="t">${f.title}</span><span class="m">${f.lines} บรรทัด · ${f.mtime_ago}</span></div>`;
}
function render(){
  let h = atsStrip(D.ats);
  D.sections.forEach(s=>{ h+=`<div class="sec-h">${s.icon} ${s.label}</div>`+s.files.map(cardHTML).join(""); });
  if(D.archive.length){ h+=`<div class="sec-h">🗄️ Archive</div>`+D.archive.map(cardHTML).join(""); }
  $("#app").innerHTML=h;
  $("#built").textContent="อัปเดต "+D.built+" · pull เพื่อ refresh";
  const n=D.sections.reduce((a,s)=>a+s.files.length,0);
  $("#foot").textContent=`${n} ไฟล์ · ${D.archive.length} archive · folder-driven`;
}
async function openReader(slug,title){
  $("#rt").textContent=title;
  $("#rbody").innerHTML='<div class="loading">กำลังโหลด…</div>';
  $("#reader").classList.add("on");
  $(".rbody").scrollTop=0;
  history.pushState({reader:1},"");
  try{
    const r=await fetch("data/"+slug+".md",{cache:"no-store"});
    $("#rbody").innerHTML=marked.parse(await r.text());
  }catch(e){ $("#rbody").innerHTML='<div class="loading">โหลดไม่ได้ — เปิดผ่าน URL เว็บ (ไม่ใช่ไฟล์)</div>'; }
}
function closeReader(){ $("#reader").classList.remove("on"); }
window.addEventListener("popstate",()=>{ if($("#reader").classList.contains("on")) closeReader(); });
$("#q").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase().trim();
  document.querySelectorAll(".card").forEach(c=>c.classList.toggle("hide",q&&!c.dataset.t.includes(q)));
  document.querySelectorAll(".sec-h").forEach(h=>h.classList.toggle("hide",!!q));
});
render();
</script>
</body></html>
